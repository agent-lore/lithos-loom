# Example lithos-loom configuration.
#
# Copy to ~/.config/lithos-loom/config.toml (or one of the per-environment
# variants like config.dev.toml / config.prod.toml) and adjust paths to
# match your machine.
#
# Selection rules:
#   - LITHOS_LOOM_CONFIG=/abs/path.toml takes absolute precedence
#   - else, LITHOS_LOOM_ENVIRONMENT=dev picks config.dev.toml
#   - else, plain config.toml is loaded

[orchestrator]
agent_id = "lithos-orchestrator-samsara"
lithos_url = "http://localhost:8765"
# task events are pushed from <lithos_url>/events; no polling cadence.
work_dir = "/tmp/lithos-loom"
max_concurrency = 4
log_level = "info"
retain_failed_workdirs = true

[projects.lithos-lens]
repo = "/home/you/projects/lithos/code/lithos-lens"
claude_config = "/home/you/.claude-lithos"
codex_config = "/home/you/.codex-lithos"

[projects.lithos-loom]
repo = "/home/you/projects/lithos/code/lithos-loom"
claude_config = "/home/you/.claude-lithos"
codex_config = "/home/you/.codex-lithos"

# ── Routes ────────────────────────────────────────────────────────────
#
# Three bundled MVP plugins. Each route's `command` is invoked as a
# subprocess; substitution tokens {{task_json}}, {{work_dir}},
# {{result_file}} are filled in by the daemon.

[[routes]]
name = "prd-decompose"
command = "uv run python -m lithos_loom.plugins.prd_decompose --task-json {{task_json}} --work-dir {{work_dir}} --result-file {{result_file}}"
max_runtime_seconds = 1800

[routes.match]
tags = ["trigger:prd-decompose"]

[[routes]]
name = "story-implement"
command = "uv run python -m lithos_loom.plugins.story_implement --task-json {{task_json}} --work-dir {{work_dir}} --result-file {{result_file}}"
max_runtime_seconds = 7200

[routes.match]
tags = ["trigger:story-implement"]

[[routes]]
name = "story-review-human"
command = "uv run python -m lithos_loom.plugins.story_review_human --task-json {{task_json}} --work-dir {{work_dir}} --result-file {{result_file}}"
# Long max_runtime — this plugin can run for days waiting on a human merge.
max_runtime_seconds = 604800
# US8: human_blocking=true surfaces tasks tagged for this route in the
# operator's Obsidian view via the obsidian-projection subscription.
# Routes default to human_blocking=false (the daemon handles them
# autonomously; nothing for the human to do).
human_blocking = true

[routes.match]
tags = ["trigger:story-review-human"]

# ── Subscriptions ─────────────────────────────────────────────────────
#
# Fire-and-forget side effects on bus events. Each [[subscriptions]]
# stanza references an `action` resolved from the
# `lithos_loom.subscriptions.handlers` Python entry-point group. Slice 0
# ships only the bundled `noop` action; real handlers
# (`obsidian-projection` etc.) arrive in Slice 1+.
#
# Filter precedence (D5): structural `match.<key>` table runs first,
# then the optional `where` Python expression. Both must hold (AND).
# The `where` scope exposes `event` and `task` (= event.payload).
#
# On persistent failure (all retry attempts exhausted), the runner posts
# a `[Friction]`-prefixed Lithos finding to the failing task by default
# (`on_persistent_failure = "friction"`). Set to "ignore" to suppress.

# [[subscriptions]]
# name = "noop-smoke"
# on = ["lithos.task.created", "lithos.task.updated"]
# action = "noop"
# # match.tags = ["debug:trace"]
# # where = "task.get('priority') == 'high'"
# on_persistent_failure = "friction"
# [subscriptions.retry]
# attempts = 5
# backoff = "exponential"        # or "linear"
# initial_delay_seconds = 0.5
# max_delay_seconds = 30.0

# Obsidian projection (US8/US9) — turns lithos.task.* events into a
# markdown task list at vault_path / tasks_file. Filters via
# is_human_actionable: tasks tagged for an autonomous route are hidden;
# tasks for a human_blocking=true route (once claimed) or with no
# matching route show up. Only wired when the obsidian-sync child is
# also enabled (see [obsidian_sync] below).
#
# Subscribe to {created, updated, claimed, released, completed,
# cancelled}: claimed/released are load-bearing for D6 — without them
# the projection never surfaces tasks that become actionable only when
# a human_blocking route claims them, never refreshes the computed
# 📅 today date, and never emits the #lithos/<route-name> tag.
# [[subscriptions]]
# name = "obsidian-tasks"
# on = [
#   "lithos.task.created",
#   "lithos.task.updated",
#   "lithos.task.claimed",
#   "lithos.task.released",
#   "lithos.task.completed",
#   "lithos.task.cancelled",
# ]
# action = "obsidian-projection"
# on_persistent_failure = "friction"
# [subscriptions.retry]
# attempts = 5
# backoff = "exponential"
# initial_delay_seconds = 0.5
# max_delay_seconds = 30.0

# ── Obsidian sync (vault host only) ───────────────────────────────────
#
# Presence of this section is the supervisor's spawn gate for the
# obsidian-sync child: include it on the host that owns the vault
# (typically samsara), omit it everywhere else. The child sleeps until
# SIGTERM in US7; US8 onwards adds the projection subscription, US15
# adds the `lithos-loom doctor` vault probe.
#
# tasks_file is relative to vault_path. resolved_ttl_days controls how
# long completed/cancelled tasks linger in tasks_file before being
# dropped (US13).
#
# Projection filter knobs (operator-level):
#   include_blocked — project tasks whose metadata.depends_on is set
#                     (default true; opt-out for a tighter daily view)
#   exclude_tags    — list of tags that suppress projection when present
#                     on a task (e.g. ["debug:trace", "internal"])

# [obsidian_sync]
# vault_path = "/home/you/Obsidian/Vault"
# tasks_file = "_lithos/tasks.md"
# resolved_ttl_days = 7
# include_blocked = true
# exclude_tags = []
# # Slice 4: where the project-context-projection writes per-project
# # context docs (one file per Lithos doc tagged project-context, at
# # <vault_path>/<projects_dir>/<slug>/<filename>). Default matches
# # the operator's typical "_lithos/" namespace for daemon-managed
# # files. Without project-context-projection wired (below), this is
# # unused.
# projects_dir = "_lithos/projects"

# ── Slice 4: project-context one-way pull (Lithos → vault) ─────────────
#
# Subscribes to lithos.note.{created,updated,deleted} events from the
# LithosNoteStream source (spawned only when this subscription is
# present). Bootstrap re-projects every existing project-context doc
# on startup; per-doc whole-file hash dedup makes cold restart a
# near-no-op when nothing changed.
# [[subscriptions]]
# name = "project-context"
# on = [
#   "lithos.note.created",
#   "lithos.note.updated",
#   "lithos.note.deleted",
# ]
# action = "project-context-projection"
# on_persistent_failure = "friction"
# [subscriptions.retry]
# attempts = 5
# backoff = "exponential"
# initial_delay_seconds = 0.5
# max_delay_seconds = 30.0

# ── Slice 5: project-context bidirectional sync (vault → Lithos) ───────
#
# Subscribes to obsidian.note.modified events from the
# ObsidianDirWatcher (spawned alongside the file watcher whenever
# [obsidian_sync] is present). Pushes operator body edits back to
# Lithos via lithos_write with optimistic locking; frontmatter-only
# edits are silently absorbed (D28 invariant). Conflicts move the
# operator's body to <vault>/_lithos/conflicts/ for recovery and pull
# canonical to the original path.
#
# Requires the project-context-projection subscription above — without
# the projection populating per-doc body-hash baselines, the dir
# watcher treats every operator edit as first-sight and never emits.
# The daemon logs a startup warning if note-push is configured
# without project-context-projection.
# [[subscriptions]]
# name = "note-push"
# on = ["obsidian.note.modified"]
# action = "note-push"
# on_persistent_failure = "friction"
# [subscriptions.retry]
# attempts = 5
# backoff = "exponential"
# initial_delay_seconds = 0.5
# max_delay_seconds = 30.0
